<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Absensi Sales</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f1f5f9;
      color: #0f172a;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .app {
      max-width: 480px; margin: 0 auto; min-height: 100vh;
      background: #fff; display: flex; flex-direction: column;
    }
    .header {
      background: linear-gradient(135deg, #0d9488 0%, #0891b2 100%);
      color: #fff; padding: 20px 16px; padding-top: calc(16px + env(safe-area-inset-top));
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header p { font-size: 12px; opacity: 0.85; margin-top: 2px; }
    .progress-bar {
      height: 4px; background: rgba(255,255,255,0.25); margin-top: 14px; border-radius: 2px; overflow: hidden;
    }
    .progress-bar > div {
      height: 100%; background: #fff; width: 33%; transition: width .35s ease;
    }
    .content { flex: 1; padding: 16px; overflow-y: auto; }
    .step { display: none; animation: fadeIn .3s ease; }
    .step.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .label { font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; display: block; }
    .input, .select, .textarea {
      width: 100%; padding: 12px 14px; border: 1px solid #cbd5e1;
      border-radius: 10px; font-size: 15px; background: #fff; color: #0f172a;
      transition: border-color .2s;
    }
    .input:focus, .select:focus, .textarea:focus {
      outline: none; border-color: #0d9488; box-shadow: 0 0 0 3px rgba(13,148,136,0.12);
    }
    .textarea { min-height: 80px; resize: vertical; font-family: inherit; }
    .field { margin-bottom: 16px; }

    .search-box { position: relative; margin-bottom: 12px; }
    .search-box input { padding-left: 40px; }
    .search-box .icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; }

    .pelanggan-list { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; }
    .pelanggan-item {
      border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px;
      cursor: pointer; transition: all .15s;
    }
    .pelanggan-item:hover { border-color: #0d9488; background: #f0fdfa; }
    .pelanggan-item.selected { border-color: #0d9488; background: #ccfbf1; }
    .pelanggan-item .nama { font-weight: 600; font-size: 14px; }
    .pelanggan-item .meta { font-size: 12px; color: #64748b; margin-top: 2px; }
    .pelanggan-item .badge {
      display: inline-block; background: #e0f2fe; color: #0369a1;
      padding: 2px 8px; border-radius: 999px; font-size: 11px; margin-top: 4px;
    }

    #pelangganMap {
      height: 200px; border-radius: 10px; margin-top: 12px;
      border: 1px solid #e2e8f0; display: none;
    }
    #pelangganMap.show { display: block; }

    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer; transition: all .15s;
    }
    .btn-primary { background: #0d9488; color: #fff; }
    .btn-primary:hover { background: #0f766e; }
    .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
    .btn-secondary { background: #f1f5f9; color: #475569; }
    .btn-secondary:hover { background: #e2e8f0; }
    .actions { display: flex; gap: 8px; margin-top: 20px; }
    .actions .btn { flex: 1; }

    .summary-card {
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px;
      padding: 14px; margin-bottom: 12px;
    }
    .summary-card .row {
      display: flex; justify-content: space-between; padding: 6px 0;
      font-size: 14px; border-bottom: 1px dashed #e2e8f0;
    }
    .summary-card .row:last-child { border-bottom: none; }
    .summary-card .row .k { color: #64748b; }
    .summary-card .row .v { font-weight: 600; color: #0f172a; }

    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .status-opt {
      border: 2px solid #e2e8f0; border-radius: 10px; padding: 14px;
      text-align: center; cursor: pointer; transition: all .15s;
    }
    .status-opt:hover { border-color: #0d9488; }
    .status-opt.selected { border-color: #0d9488; background: #f0fdfa; }
    .status-opt .ic { font-size: 24px; }
    .status-opt .lbl { font-size: 13px; font-weight: 600; margin-top: 4px; }

    .geo-info {
      font-size: 12px; color: #64748b; padding: 8px 10px;
      background: #f0fdfa; border-radius: 8px; margin-top: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .geo-info.ok { background: #f0fdfa; color: #0f766e; }
    .geo-info.err { background: #fef2f2; color: #b91c1c; }

    .toast {
      position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
      background: #0f172a; color: #fff; padding: 12px 18px; border-radius: 10px;
      font-size: 14px; opacity: 0; transition: opacity .25s, transform .25s;
      z-index: 9999; max-width: 90vw; text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }

    .loader {
      width: 24px; height: 24px; border: 3px solid #cbd5e1;
      border-top-color: #0d9488; border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-info { text-align: center; font-size: 11px; color: #94a3b8; padding: 12px 0; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1 id="stepTitle">Pilih Sales</h1>
      <p id="stepDesc">Langkah 1 dari 3</p>
      <div class="progress-bar"><div id="progressFill"></div></div>
    </div>

    <div class="content">
      <div id="loaderInit" class="loader"></div>

      <!-- STEP 1: PILIH SALES -->
      <div class="step" id="step1">
        <div class="field">
          <label class="label">Sales Force</label>
          <select class="select" id="salesSelect">
            <option value="">— Pilih sales —</option>
          </select>
        </div>
        <div class="field">
          <label class="label">Tanggal</label>
          <input type="date" class="input" id="absenDate">
        </div>
        <button class="btn btn-primary" id="nextStep1" disabled>Lanjut →</button>
      </div>

      <!-- STEP 2: PILIH PELANGGAN -->
      <div class="step" id="step2">
        <div class="search-box">
          <span class="icon">🔍</span>
          <input type="text" class="input" id="searchPelanggan" placeholder="Cari nama pelanggan…">
        </div>
        <div class="pelanggan-list" id="pelangganList"></div>
        <div id="pelangganMap"></div>
        <div class="actions">
          <button class="btn btn-secondary" data-back="1">← Kembali</button>
          <button class="btn btn-primary" id="nextStep2" disabled>Lanjut →</button>
        </div>
      </div>

      <!-- STEP 3: KONFIRMASI + GEO + SUBMIT -->
      <div class="step" id="step3">
        <div class="summary-card" id="summaryCard"></div>
        <div class="field">
          <label class="label">Status Kehadiran</label>
          <div class="status-grid">
            <div class="status-opt selected" data-status="Hadir">
              <div class="ic">✅</div><div class="lbl">Hadir</div>
            </div>
            <div class="status-opt" data-status="Tidak Hadir">
              <div class="ic">❌</div><div class="lbl">Tidak Hadir</div>
            </div>
          </div>
        </div>
        <div class="field">
          <label class="label">Catatan (opsional)</label>
          <textarea class="textarea" id="catatan" placeholder="Catatan kunjungan…"></textarea>
        </div>
        <div class="geo-info" id="geoInfo">📍 Mendapatkan lokasi Anda…</div>
        <div class="actions">
          <button class="btn btn-secondary" data-back="2">← Kembali</button>
          <button class="btn btn-primary" id="submitBtn" disabled>Kirim Absen</button>
        </div>
      </div>

      <div class="footer-info">
        Sistem Absensi Sales • Powered by Google Apps Script
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <script>
    // ===== STATE =====
    const state = {
      init: null,
      step: 1,
      salesId: '',
      salesNama: '',
      pelangganId: '',
      pelangganNama: '',
      pelangganLat: null,
      pelangganLng: null,
      status: 'Hadir',
      userLat: null,
      userLng: null,
      geoOk: false,
      map: null,
      markers: []
    };

    // ===== TOAST =====
    function toast(msg, dur = 2500) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), dur);
    }

    // ===== HELPERS =====
    function $(id) { return document.getElementById(id); }
    function haversine(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const toRad = x => x * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a = Math.sin(dLat/2)**2 +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                Math.sin(dLng/2)**2;
      return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }
    function fmtDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${dd}`;
    }

    // ===== NAVIGATION =====
    function goToStep(n) {
      state.step = n;
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      $('step' + n).classList.add('active');
      const titles = {
        1: ['Pilih Sales', 'Langkah 1 dari 3'],
        2: ['Kunjungi siapa?', 'Langkah 2 dari 3'],
        3: ['Konfirmasi Absen', 'Langkah 3 dari 3']
      };
      $('stepTitle').textContent = titles[n][0];
      $('stepDesc').textContent = titles[n][1];
      $('progressFill').style.width = (n * 33.33) + '%';
      if (n === 2) setTimeout(initPelangganMap, 200);
      if (n === 3) initStep3();
    }

    // ===== INIT PAGE =====
    function initPage() {
      google.script.run.withSuccessHandler(function(data) {
        state.init = data;
        // Isi dropdown sales
        const sel = $('salesSelect');
        (data.sales || []).forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = s.nama + (s.area ? ' — ' + s.area : '');
          sel.appendChild(opt);
        });
        // Tanggal default hari ini
        $('absenDate').value = fmtDate(new Date(data.serverTime || new Date()));
        $('loaderInit').style.display = 'none';
        goToStep(1);
      }).withFailureHandler(function(err) {
        $('loaderInit').style.display = 'none';
        toast('Gagal load data: ' + err.message);
      }).getInitAbsenMandiri();
    }

    // ===== STEP 1 → STEP 2 =====
    $('salesSelect').addEventListener('change', e => {
      state.salesId = e.target.value;
      state.salesNama = e.target.options[e.target.selectedIndex].text.split(' — ')[0];
      $('nextStep1').disabled = !state.salesId;
    });
    $('nextStep1').addEventListener('click', () => {
      if (!state.salesId) return toast('Pilih sales dulu');
      renderPelangganList();
      goToStep(2);
    });

    // ===== STEP 2: RENDER PELANGGAN LIST =====
    function renderPelangganList() {
      const list = $('pelangganList');
      list.innerHTML = '';
      const pelanggan = (state.init.pelanggan || []).filter(p => p.status !== 'Non-Aktif');
      if (pelanggan.length === 0) {
        list.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:20px;">Tidak ada pelanggan</p>';
        return;
      }
      pelanggan.forEach(p => {
        const div = document.createElement('div');
        div.className = 'pelanggan-item';
        div.dataset.id = p.id;
        div.dataset.nama = p.nama;
        div.dataset.lat = p.lat || '';
        div.dataset.lng = p.lng || '';
        div.innerHTML = `
          <div class="nama">🏢 ${p.nama}</div>
          <div class="meta">${p.alamat || ''} ${p.kota ? '• ' + p.kota : ''}</div>
          ${p.kategori ? '<span class="badge">' + p.kategori + '</span>' : ''}
          ${p.lat ? '<span class="badge" style="background:#dcfce7;color:#15803d;">📍 Punya koordinat</span>' : ''}
        `;
        div.addEventListener('click', () => selectPelanggan(div, p));
        list.appendChild(div);
      });
    }

    function selectPelanggan(el, p) {
      document.querySelectorAll('.pelanggan-item').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
      state.pelangganId = p.id;
      state.pelangganNama = p.nama;
      state.pelangganLat = p.lat;
      state.pelangganLng = p.lng;
      $('nextStep2').disabled = false;
      // Fokus peta ke pelanggan
      if (p.lat && p.lng && state.map) {
        state.map.setView([p.lat, p.lng], 15);
      }
    }

    // ===== STEP 2: PELANGGAN MAP (LEAFLET) =====
    function initPelangganMap() {
      const withCoords = (state.init.pelanggan || []).filter(p => p.lat && p.lng);
      if (withCoords.length === 0) {
        $('pelangganMap').classList.remove('show');
        return;
      }
      $('pelangganMap').classList.add('show');

      // Inisialisasi peta kalau belum
      if (!state.map) {
        state.map = L.map('pelangganMap').setView([-2.5, 118], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '&copy; OpenStreetMap',
          maxZoom: 19
        }).addTo(state.map);
      } else {
        state.map.invalidateSize();
      }

      // Hapus marker lama
      state.markers.forEach(m => state.map.removeLayer(m));
      state.markers = [];

      // Tambah marker semua pelanggan
      withCoords.forEach(p => {
        const m = L.marker([p.lat, p.lng]).addTo(state.map)
          .bindPopup('<b>' + p.nama + '</b><br>' + (p.alamat || '') + '<br>' + (p.kategori || ''));
        state.markers.push(m);
      });

      // Fit bounds ke semua marker
      if (withCoords.length > 0) {
        const group = L.featureGroup(state.markers);
        state.map.fitBounds(group.getBounds().pad(0.2));
      }
    }

    // ===== SEARCH PELANGGAN =====
    $('searchPelanggan').addEventListener('input', e => {
      const q = e.target.value.toLowerCase();
      document.querySelectorAll('.pelanggan-item').forEach(item => {
        const nama = item.dataset.nama.toLowerCase();
        item.style.display = nama.includes(q) ? '' : 'none';
      });
    });

    // ===== STEP 2 → STEP 3 =====
    $('nextStep2').addEventListener('click', () => {
      if (!state.pelangganId) return toast('Pilih pelanggan dulu');
      goToStep(3);
    });

    // ===== BACK BUTTONS =====
    document.querySelectorAll('[data-back]').forEach(b => {
      b.addEventListener('click', () => goToStep(parseInt(b.dataset.back)));
    });

    // ===== STEP 3: INIT =====
    function initStep3() {
      // Render summary
      const sc = $('summaryCard');
      const date = $('absenDate').value;
      const p = (state.init.pelanggan || []).find(x => x.id === state.pelangganId);
      sc.innerHTML = `
        <div class="row"><span class="k">Sales</span><span class="v">${state.salesNama}</span></div>
        <div class="row"><span class="k">Tanggal</span><span class="v">${date}</span></div>
        <div class="row"><span class="k">Pelanggan</span><span class="v">${state.pelangganNama}</span></div>
        ${p && p.alamat ? '<div class="row"><span class="k">Alamat</span><span class="v" style="text-align:right;max-width:60%;">' + p.alamat + '</span></div>' : ''}
        ${p && p.kota ? '<div class="row"><span class="k">Kota</span><span class="v">' + p.kota + '</span></div>' : ''}
      `;
      // Get user location
      getUserLocation();
    }

    // ===== STATUS SELECTION =====
    document.querySelectorAll('.status-opt').forEach(opt => {
      opt.addEventListener('click', () => {
        document.querySelectorAll('.status-opt').forEach(x => x.classList.remove('selected'));
        opt.classList.add('selected');
        state.status = opt.dataset.status;
      });
    });

    // ===== GEOLOCATION =====
    function getUserLocation() {
      const info = $('geoInfo');
      info.className = 'geo-info';
      info.textContent = '📍 Mendapatkan lokasi Anda…';
      $('submitBtn').disabled = true;

      if (!navigator.geolocation) {
        info.className = 'geo-info err';
        info.textContent = '❌ Browser tidak mendukung geolocation';
        return;
      }
      navigator.geolocation.getCurrentPosition(
        pos => {
          state.userLat = pos.coords.latitude;
          state.userLng = pos.coords.longitude;
          state.geoOk = true;
          let jarakStr = '';
          if (state.pelangganLat && state.pelangganLng) {
            const jarak = haversine(state.userLat, state.userLng,
                                    state.pelangganLat, state.pelangganLng);
            jarakStr = ' • Jarak ke pelanggan: ' + jarak + ' m';
          }
          info.className = 'geo-info ok';
          info.textContent = '✅ Lokasi: ' + state.userLat.toFixed(5) + ', ' +
                             state.userLng.toFixed(5) + jarakStr;
          $('submitBtn').disabled = false;
        },
        err => {
          info.className = 'geo-info err';
          info.textContent = '❌ Gagal: ' + (err.message || 'Tidak dapat lokasi');
          // Tetap allow submit tapi tanpa koordinat
          $('submitBtn').disabled = false;
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    }

    // ===== SUBMIT =====
    $('submitBtn').addEventListener('click', () => {
      const btn = $('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Mengirim…';

      let jarak = 0;
      if (state.userLat && state.pelangganLat && state.pelangganLng) {
        jarak = haversine(state.userLat, state.userLng,
                          state.pelangganLat, state.pelangganLng);
      }

      const payload = {
        salesId: state.salesId,
        salesNama: state.salesNama,
        pelangganId: state.pelangganId,
        pelangganNama: state.pelangganNama,
        latSales: state.userLat || '',
        lngSales: state.userLng || '',
        jarak: jarak,
        status: state.status,
        catatan: $('catatan').value
      };

      google.script.run.withSuccessHandler(res => {
        if (res.success) {
          toast('✅ ' + res.message, 3000);
          setTimeout(() => location.reload(), 1500);
        } else {
          toast('❌ ' + res.message, 3500);
          btn.disabled = false;
          btn.textContent = 'Kirim Absen';
        }
      }).withFailureHandler(err => {
        toast('❌ ' + err.message, 3500);
        btn.disabled = false;
        btn.textContent = 'Kirim Absen';
      }).submitAbsen(payload);
    });

    // ===== START =====
    initPage();
  </script>
</body>
</html>
